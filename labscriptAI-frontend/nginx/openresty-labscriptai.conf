# ============================================================
# LabscriptAI 前端 + API 反代配置
# 适用环境：OpenResty + 1Panel
# 网站根目录：/opt/1panel/www/sites/labscriptai.cn/index
# 前端运行目录：/opt/1panel/www/sites/labscriptai.cn/index/dist
# ============================================================

server {
    listen 80;
    listen 443 ssl http2;
    server_name labscriptai.cn;

    # ---- SSL 证书（由 1Panel 自动管理，路径按实际调整） ----
    ssl_certificate     /opt/1panel/www/sites/labscriptai.cn/ssl/fullchain.pem;
    ssl_certificate_key /opt/1panel/www/sites/labscriptai.cn/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # HTTP → HTTPS 重定向
    if ($scheme = http) {
        return 301 https://$host$request_uri;
    }

    # ---- 日志 ----
    access_log /opt/1panel/www/sites/labscriptai.cn/log/access.log;
    error_log  /opt/1panel/www/sites/labscriptai.cn/log/error.log;

    # ---- 安全头部 ----
    add_header Strict-Transport-Security "max-age=31536000" always;

    # ---- 隐藏敏感文件 ----
    location ~ ^/(\.git|\.env|\.user\.ini|\.htaccess) {
        return 404;
    }

    # ---- Let's Encrypt 验证 ----
    location ^~ /.well-known {
        allow all;
        root /opt/1panel/www/sites/labscriptai.cn/index;
    }

    # ---- Gzip 压缩 ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/xml image/svg+xml;

    # ============================================================
    # API 反向代理
    # 将 /api/ 请求转发到后端 FastAPI 服务
    # 修改 proxy_pass 的地址以匹配你的后端实际地址
    # ============================================================
    location /api/ {
        proxy_pass http://127.0.0.1:9002;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 支持（流式响应）
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # CORS（如果后端已处理 CORS，此处可以移除）
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
            add_header Access-Control-Max-Age       1728000;
            add_header Content-Length               0;
            add_header Content-Type                 "text/plain; charset=utf-8";
            return 204;
        }
    }

    # ============================================================
    # 前端静态文件
    # 运行目录为 dist，即 /opt/1panel/.../index/dist
    # ============================================================
    root /opt/1panel/www/sites/labscriptai.cn/index/dist;
    index index.html;

    # SPA 路由 fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源长期缓存（Vite 构建产物带 hash）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # HTML 不缓存（确保用户拿到最新入口）
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    error_page 404 /index.html;
}
